<!-- ═══════════════════════════════════════════════════════════
     CLASS BOXES
     Layout:
       User         – col 1, row 1  (x=30,  y=30)
       Department   – col 2, row 1  (x=340, y=30)

<!-- ── helper macro: class box ──────────────────────────────
     We draw each manually for full control.
     Structure: header rect + title + stereotype, then attr rect + lines, then method rect
-->

<!-- ══════════════ USER (x=30, y=30, w=280) ══════════════ -->
<g id="cls-user">
  <!-- header -->
  <rect x="30" y="30" width="280" height="46" rx="6" ry="0" fill="#1d4ed8" stroke="#1e3a8a" stroke-width="1.5"/>
  <rect x="30" y="70" width="280" height="2" fill="#1e3a8a"/>
  <text x="170" y="49" text-anchor="middle" font-size="10" fill="#bfdbfe">«Model»</text>
  <text x="170" y="67" text-anchor="middle" font-size="13" font-weight="bold" fill="white">User</text>

  <!-- attributes -->
  <rect x="30" y="76" width="280" height="196" fill="#eff6ff" stroke="#1d4ed8" stroke-width="1.5"/>
  <line x1="30" y1="120" x2="310" y2="120" stroke="#bfdbfe" stroke-width="0.8"/>
  <text x="42" y="94"  font-size="10" fill="#1e40af">- id: bigint «PK»</text>
  <text x="42" y="108" font-size="10" fill="#1e40af">- name: string</text>
  <text x="42" y="122" font-size="10" fill="#1e40af">- email: string «unique»</text>
  <text x="42" y="136" font-size="10" fill="#1e40af">- code: string «unique»</text>
  <text x="42" y="150" font-size="10" fill="#1e40af">- password: string «hashed»</text>
  <text x="42" y="164" font-size="10" fill="#1e40af">- role: enum(super_admin|admin|manager|employee)</text>
  <text x="42" y="178" font-size="10" fill="#1e40af">- department_id: bigint «FK»</text>
  <text x="42" y="192" font-size="10" fill="#1e40af">- avatar: string?</text>
  <text x="42" y="206" font-size="10" fill="#1e40af">- deleted_at: timestamp? «SoftDelete»</text>
  <text x="42" y="220" font-size="10" fill="#1e40af">- created_at / updated_at: timestamp</text>

  <!-- separator -->
  <line x1="30" y1="272" x2="310" y2="272" stroke="#1d4ed8" stroke-width="1.5"/>
  <!-- methods -->
  <rect x="30" y="272" width="280" height="72" fill="#dbeafe" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="42" y="288" font-size="10" fill="#1e40af">+ isAdmin(): bool</text>
  <text x="42" y="302" font-size="10" fill="#1e40af">+ isManager(): bool</text>
  <text x="42" y="316" font-size="10" fill="#1e40af">+ department(): BelongsTo</text>
  <text x="42" y="330" font-size="10" fill="#1e40af">+ faceEncodings(): HasMany</text>
  <text x="42" y="344" font-size="10" fill="#1e40af">+ attendances(): HasMany</text>
</g>

<!-- ═══════════════════════════════════════════════════════════
     RELATIONSHIPS
════════════════════════════════════════════════════════════ -->

<!-- 1. User --(belongsTo)--> Department  (User.department_id → Dept.id)
     Composition diamond on Department side, arrow on User side -->
<!-- line from right of User (310,170) to left of Dept (370,170) -->
<line x1="310" y1="170" x2="370" y2="170" stroke="#334155" stroke-width="1.8" marker-start="url(#arr-diamond-hollow)" marker-end="url(#arr-assoc)"/>
<text x="320" y="163" font-size="9" fill="#475569">1</text>
<text x="352" y="163" font-size="9" fill="#475569">*</text>
<text x="318" y="183" font-size="9" fill="#64748b">belongsTo</text>

<!-- 2. User --(hasMany)--> FaceEncoding -->
<!-- from bottom of User (170,344) down to top of FaceEncoding (850,700) — route via User bottom then right -->
<path d="M 170 990 L 170 1010 L 720 1010 L 720 890" stroke="#334155" stroke-width="1.5" fill="none" stroke-dasharray="none" marker-end="url(#arr-assoc)"/>
<!-- Hmm that's messy. Let me use a cleaner path.
FaceEncoding top-left corner is at (720, 700). User bottom is at (170, 986).
Route: User right edge (310, 800) → right → down → FaceEncoding top -->

<!-- Re-route: User right (310, 800) → (650, 800) → (650, 730) → (720, 730) -->
<path d="M 340 800 L 650 800 L 650 730 L 720 730" stroke="#be185d" stroke-width="1.5" fill="none" marker-start="url(#arr-diamond-fill)" marker-end="url(#arr-assoc)"/>
<text x="344" y="793" font-size="9" fill="#be185d">1</text>
<text x="696" y="723" font-size="9" fill="#be185d">*</text>
<text x="490" y="793" font-size="9" fill="#be185d">hasMany</text>

<!-- 3. User --(hasMany)--> Attendance -->
<!-- User bottom (170, 986) to Attendance top (185, 700) — straight line down -->
<line x1="185" y1="344" x2="185" y2="700" stroke="#0f766e" stroke-width="1.5" marker-start="url(#arr-diamond-fill)" marker-end="url(#arr-assoc)"/>
<text x="192" y="360" font-size="9" fill="#0f766e">1</text>
<text x="192" y="694" font-size="9" fill="#0f766e">*</text>
<text x="196" y="530" font-size="9" fill="#0f766e">hasMany</text>

<!-- 4. Department --(hasMany)--> ShiftSchedule (assignee_type=department) -->
