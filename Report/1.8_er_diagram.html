<h1>1.8. Biểu đồ Mối quan hệ giữa các Dữ liệu (ER Diagram)</h1>
<p class="sub">Crow's Foot Notation – 7 thực thể nghiệp vụ – Hệ thống Điểm danh Nhận diện Khuôn mặt</p>
<div class="wrap">
<svg viewBox="0 0 1140 660" width="100%" xmlns="http://www.w3.org/2000/svg">

<!-- ══════════════════════════════════════════════════
  DEFS: crow's foot markers & arrow
══════════════════════════════════════════════════ -->
<defs>
  <!-- standard open arrowhead (for directed lines) -->
  <marker id="open-arr" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
    <path d="M1,1 L7,4 L1,7" fill="none" stroke="#64748b" stroke-width="1.3"/>
  </marker>
  <marker id="open-arr-dash" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
    <path d="M1,1 L7,4 L1,7" fill="none" stroke="#94a3b8" stroke-width="1.3"/>
  </marker>
</defs>

<!-- ══════════════════════════════════════════════════
  LEGEND (bottom-right)
══════════════════════════════════════════════════ -->
<rect x="920" y="510" width="200" height="130" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
<text x="1020" y="530" text-anchor="middle" font-size="11" font-weight="bold" fill="#334155">Ký hiệu Crow's Foot</text>

<!-- One ||  -->
<line x1="938" y1="548" x2="978" y2="548" stroke="#64748b" stroke-width="1.5"/>
<line x1="970" y1="541" x2="970" y2="555" stroke="#64748b" stroke-width="1.5"/>
<line x1="964" y1="541" x2="964" y2="555" stroke="#64748b" stroke-width="1.5"/>
<text x="984" y="552" font-size="10" fill="#475569">Một (1) — bắt buộc</text>

<!-- Zero or one 0|  -->
<line x1="938" y1="568" x2="978" y2="568" stroke="#64748b" stroke-width="1.5"/>
<line x1="972" y1="561" x2="972" y2="575" stroke="#64748b" stroke-width="1.5"/>
<circle cx="962" cy="568" r="4" fill="white" stroke="#64748b" stroke-width="1.3"/>
<text x="984" y="572" font-size="10" fill="#475569">Không hoặc một (0..1)</text>

<!-- Many (crow's foot) -->
<line x1="938" y1="588" x2="978" y2="588" stroke="#64748b" stroke-width="1.5"/>
<path d="M 966,582 L 978,588 L 966,594 M 972,581 L 972,595" fill="none" stroke="#64748b" stroke-width="1.5"/>
<text x="984" y="592" font-size="10" fill="#475569">Nhiều (N) — bắt buộc</text>

<!-- Zero or many -->
<line x1="938" y1="608" x2="978" y2="608" stroke="#64748b" stroke-width="1.5"/>
<path d="M 966,602 L 978,608 L 966,614 M 970,601 L 970,615" fill="none" stroke="#64748b" stroke-width="1.5"/>
<circle cx="958" cy="608" r="4" fill="white" stroke="#64748b" stroke-width="1.3"/>
<text x="984" y="612" font-size="10" fill="#475569">Không hoặc nhiều (0..*)</text>

<!-- dashed = optional/polymorphic -->
<line x1="938" y1="628" x2="978" y2="628" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3"/>
<text x="984" y="632" font-size="10" fill="#475569">Tuỳ chọn / Polymorphic</text>

<!-- ══════════════════════════════════════════════════
  ENTITY: DEPARTMENT  x=30 y=160 w=210
══════════════════════════════════════════════════ -->
<g id="e-dept">
  <rect x="30" y="160" width="210" height="30" rx="4" fill="#7c3aed" stroke="#5b21b6" stroke-width="1.5"/>
  <text x="135" y="180" text-anchor="middle" font-size="12" font-weight="bold" fill="white">DEPARTMENT</text>
  <rect x="30" y="190" width="210" height="108" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1.5"/>
  <!-- rows h=18 each -->
  <!-- id PK -->
  <rect x="30" y="190" width="210" height="18" fill="#fef9c3"/>
  <text x="38" y="203" font-size="10" font-weight="bold" fill="#713f12">⬡ id</text>
  <text x="238" y="203" text-anchor="end" font-size="10" fill="#78350f">BIGINT PK</text>
  <!-- name -->
  <text x="38" y="221" font-size="10" fill="#374151">  name</text>
  <text x="238" y="221" text-anchor="end" font-size="10" fill="#6b7280">VARCHAR</text>
  <!-- check_in_time -->
  <text x="38" y="239" font-size="10" fill="#374151">  check_in_time</text>
  <text x="238" y="239" text-anchor="end" font-size="10" fill="#6b7280">TIME</text>
  <!-- check_out_time -->
  <text x="38" y="257" font-size="10" fill="#374151">  check_out_time</text>
  <text x="238" y="257" text-anchor="end" font-size="10" fill="#6b7280">TIME</text>
  <!-- late_tolerance -->
  <text x="38" y="275" font-size="10" fill="#374151">  late_tolerance</text>
  <text x="238" y="275" text-anchor="end" font-size="10" fill="#6b7280">INT (phút)</text>
  <!-- manager_id FK -->
  <rect x="30" y="280" width="210" height="18" fill="#eff6ff"/>
  <text x="38" y="293" font-size="10" fill="#1d4ed8">⬡ manager_id</text>
  <text x="238" y="293" text-anchor="end" font-size="10" fill="#1d4ed8">FK → USER</text>
  <!-- border -->
  <rect x="30" y="160" width="210" height="138" rx="4" fill="none" stroke="#7c3aed" stroke-width="1.5"/>
</g>

  <text x="558" y="451" text-anchor="end" font-size="10" fill="#c2410c">TIMESTAMP «SoftDel»</text>
  <!-- border -->
  <rect x="330" y="280" width="230" height="192" rx="4" fill="none" stroke="#1d4ed8" stroke-width="2"/>
</g>

<!-- ══════════════════════════════════════════════════

</g>

<!-- ══════════════════════════════════════════════════
  RELATIONSHIP LINES
══════════════════════════════════════════════════ -->

<!-- ── R1: DEPARTMENT (1) ──── has employees ──── (N) USER
     DEPT right (240,225) → USER left (330,355) ── -->
<line x1="240" y1="225" x2="330" y2="350" stroke="#7c3aed" stroke-width="2"/>
<!-- ONE mark at DEPT end: perpendicular bar rotated to match line direction -->
<!-- direction angle ≈ 55°, just put two bars 10px in from endpoint -->
<line x1="246" y1="216" x2="235" y2="234" stroke="#7c3aed" stroke-width="1.8"/>
<line x1="252" y1="220" x2="241" y2="238" stroke="#7c3aed" stroke-width="1.8"/>
<!-- MANY crow's foot at USER end: three lines diverging before endpoint -->
<path d="M 322,343 L 330,350 L 322,357 M 325,341 L 325,359" fill="none" stroke="#7c3aed" stroke-width="1.8"/>
<!-- Label -->
<rect x="252" y="272" width="68" height="16" rx="3" fill="white" opacity=".9"/>
<text x="286" y="283" text-anchor="middle" font-size="9" font-weight="bold" fill="#7c3aed">thuộc về</text>
<text x="245" y="222" font-size="10" font-weight="bold" fill="#7c3aed">1</text>
<text x="316" y="348" font-size="10" font-weight="bold" fill="#7c3aed">N</text>

<!-- ── R2: DEPARTMENT (0..1) manager ── manages ── (1) USER  [dashed, manager_id]
     DEPT right (240,285) → USER left (330,310) ── -->
<line x1="240" y1="285" x2="330" y2="308" stroke="#94a3b8" stroke-width="1.3" stroke-dasharray="5,3"/>
<!-- circle = optional on dept side -->
<circle cx="247" cy="286" r="3.5" fill="white" stroke="#94a3b8" stroke-width="1.3"/>
<line x1="254" y1="284" x2="248" y2="293" stroke="#94a3b8" stroke-width="1.3"/>
